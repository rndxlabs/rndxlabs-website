# RNDX Labs — netlify.toml
# Voorkomt dat Cloudflare HTML aanpast + demo redirects

[[headers]]
  for = "/*"
  [headers.values]
    X-Cloudflare-No-Transform = "1"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.html"
  [headers.values]
    X-Cloudflare-No-Transform = "1"

# ── Murat Yeni digital card: noindex (laag 2 van 3) ──
[[headers]]
  for = "/murat-yeni"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/murat-yeni/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ── Murat Yeni digital card ─────────────────────────
# Clean-URL rewrite: /murat-yeni serveert 200 zonder 301-hop
[[redirects]]
  from   = "/murat-yeni"
  to     = "/murat-yeni/index.html"
  status = 200
  force  = true

# ── Privacy: clean-URL rewrites (200, geen 301-hop) ──
[[redirects]]
  from   = "/privacy"
  to     = "/privacy/index.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/en/privacy"
  to     = "/en/privacy/index.html"
  status = 200

# ── Demo redirects ──────────────────────────────────
# Korte URL's die doorverwijzen naar de demo map

[[redirects]]
  from   = "/demo01"
  to     = "/demo/01/index.html"
  status = 200

[[redirects]]
  from   = "/demo02"
  to     = "/demo/02/index.html"
